server {
    listen 80;
    server_name localhost;

    # React SPA
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Flask metadata API
    location /api/ {
        proxy_pass http://backend-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_read_timeout 60;
    }

    # TiTiler tile server (COG → XYZ tiles)
    # Frontend requests: /tiles/cog/tiles/{z}/{x}/{y}@1x?url=/cog/...
    location /tiles/ {
        proxy_pass http://tile-server:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tile responses are PNG/JPEG – larger buffers
        proxy_buffer_size 256k;
        proxy_buffers 8 512k;
        proxy_busy_buffers_size 1m;
        proxy_read_timeout 30;
        # Cache tiles at proxy level
        proxy_cache_valid 200 5m;
        add_header X-Tile-Proxy "titiler" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
